<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysian Bistro</title>
</head>

<body class="reservation-bg">
    <header>
        <div class="logo"><img src="images/elysian-logo.svg" alt="Elysian Restaurant Logo"></div>
        <nav>
            <a href="/">Home</a>
            <a href="menu.html">Menu</a>
            <a href="reservation.html">Reservations</a>
            <a href="about.html">About us</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <main class="reservation">
        <div class="reservation-img"></div>
        <div class="reservation-content">
            <h2 id="reso-status-message">Make a reservation</h2>
            <form id="reservation-form">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" autocomplete="given-name">
                <label for="lastname">Last Name</label>
                <input type="text" id="lastname" name="lastname" autocomplete="family-name" required>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="email" required>
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone" autocomplete="tel" required>
                <div class="two-col">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" required>
                <label for="time">Time</label>
                <select id="time" name="time" required>
                    <option value="5:00 PM">5:00 PM</option>
                    <option value="5:15 PM">5:15 PM</option>
                    <option value="5:30 PM">5:30 PM</option>
                    <option value="5:45 PM">5:45 PM</option>
                    <option value="6:00 PM">6:00 PM</option>
                    <option value="6:15 PM">6:15 PM</option>
                    <option value="6:30 PM">6:30 PM</option>
                    <option value="6:45 PM">6:45 PM</option>
                    <option value="7:00 PM">7:00 PM</option>
                    <option value="7:15 PM">7:15 PM</option>
                    <option value="7:30 PM">7:30 PM</option>
                    <option value="7:45 PM">7:45 PM</option>
                    <option value="8:00 PM">8:00 PM</option>
                    <option value="8:15 PM">8:15 PM</option>
                    <option value="8:30 PM">8:30 PM</option>
                    <option value="8:45 PM">8:45 PM</option>
                    <option value="9:00 PM">9:00 PM</option>
                    <option value="9:15 PM">9:15 PM</option>
                    <option value="9:30 PM">9:30 PM</option>
                    <option value="9:45 PM">9:45 PM</option>
                </select>
            </div>
                <label for="guests">Number of guests</label>
                <select id="guests" name="guests" required>
                    <option value="1">1 Guest</option>
                    <option value="2">2 Guests</option>
                    <option value="3">3 Guests</option>
                    <option value="4">4 Guests</option>
                    <option value="5">5 Guests</option>
                    <option value="6">6 Guests</option>
                </select>
                <button type="button" class="primary-btn">Book Reservation</button>
            </form>
            <span>* For 7+ guests please call <a href="tel:+15551234567">+1 (555) 123-4567</a> or email at <a
                    href="mailto:info@elysianbistro.com">info@elysianbistro.com</a> and we will be happy to assist
                you.</span>
        </div>
    </main>
    <footer>
        <p>&copy; 2023 - Elysian Bistro All Rights Reserved</p>
    </footer>
    <script type="module" src="js/main.js"></script>
</body>

</html>
